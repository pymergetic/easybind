# Build and upload wheels/sdists when a version tag is pushed.
# Requires a PyPI API token in repository secrets: PYPI_API_TOKEN
# (or replace with trusted publishing: https://docs.pypi.org/trusted-publishers/)

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --upgrade build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check artifacts
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
